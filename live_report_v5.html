<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>直播数据报数工具</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif; background: #f5f5f0; min-height: 100vh; padding: 1rem; }
.wrap { max-width: 480px; margin: 0 auto; padding: 1rem 0; }
.card { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
.stitle { font-size: 12px; font-weight: 500; color: #888; margin-bottom: 12px; letter-spacing: 0.05em; text-transform: uppercase; }
.fg { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
.fg label { font-size: 13px; color: #888; }
.fg input { border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; padding: 9px 10px; font-size: 15px; background: #f5f5f0; color: #1a1a1a; width: 100%; }
.fg input:focus { outline: none; border-color: rgba(0,0,0,0.4); background: #fff; }
.two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.crow { background: #f5f5f0; border-radius: 8px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
.crow span:first-child { font-size: 13px; color: #888; }
.crow span:last-child { font-size: 17px; font-weight: 500; color: #1a1a1a; }
.pbox { background: #f5f5f0; border-radius: 8px; padding: 16px; font-size: 16px; line-height: 2.2; color: #1a1a1a; white-space: pre-wrap; min-height: 60px; border: 0.5px solid rgba(0,0,0,0.12); }
.btn { width: 100%; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; border: none; margin-top: 10px; }
.bg { background: #1D9E75; color: #fff; }
.bs { background: #f5f5f0; color: #1a1a1a; border: 0.5px solid rgba(0,0,0,0.15); margin-top: 8px; }
.bm { background: #f5f5f0; color: #888; border: 0.5px solid rgba(0,0,0,0.15); margin-top: 8px; font-size: 13px; }
.copied { background: #0F6E56 !important; }
.trow { display: flex; gap: 8px; align-items: center; }
.trow select { flex: 1; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; padding: 9px 10px; font-size: 15px; background: #f5f5f0; color: #1a1a1a; }
.hint { font-size: 12px; color: #888; margin-top: 6px; }
.psm { font-size: 13px; color: #888; background: #f5f5f0; border-radius: 8px; padding: 8px 12px; margin-bottom: 10px; display: none; }
.hrow { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 0.5px solid rgba(0,0,0,0.07); }
.hrow:last-child { border-bottom: none; }
.hempty { font-size: 14px; color: #bbb; text-align: center; padding: 12px 0; }
.hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.clrbtn { font-size: 12px; color: #888; cursor: pointer; background: none; border: none; padding: 0; }
</style>
</head>
<body>
<div class="wrap">

  <div class="card">
    <div class="stitle">当前报数时间</div>
    <div class="trow">
      <select id="hour"></select>
      <span style="color:#888">:</span>
      <select id="minute"><option value="00">00</option><option value="30">30</option></select>
    </div>
    <div class="hint" id="hint"></div>
  </div>

  <div class="card">
    <div class="stitle">本次数据（从平台抄）</div>
    <div class="two">
      <div class="fg"><label>累计 GMV（元）</label><input type="number" id="gmv" placeholder="82920" oninput="update()"></div>
      <div class="fg"><label>累计消耗（元）</label><input type="number" id="cost" placeholder="1530" oninput="update()"></div>
    </div>
    <div class="fg"><label>ROI（可手动填，否则自动算）</label><input type="number" id="roi_manual" placeholder="自动计算" oninput="update()"></div>
    <div class="crow"><span>全域 ROI</span><span id="roi_val">—</span></div>
  </div>

  <div class="card">
    <div class="stitle">预览报告</div>
    <div class="psm" id="prev-summary"></div>
    <div class="pbox" id="preview">填写数据后自动生成...</div>
    <button class="btn bg" id="copyBtn" onclick="copyText()">一键复制，发微信群</button>
    <button class="btn bs" onclick="nextPeriod()">已发送 → 准备下一时段 ↗</button>
    <button class="btn bm" onclick="resetAll()">重新开播（清空所有）</button>
  </div>

  <div class="card">
    <div class="hdr">
      <div class="stitle" style="margin-bottom:0">时段 GMV 历史</div>
      <button class="clrbtn" onclick="clearHistory()">清空</button>
    </div>
    <div id="hlist"><div class="hempty">发送后自动记录</div></div>
  </div>

  <div class="card">
    <div class="stitle">官号 / 达人 GMV 对比</div>
    <div class="two">
      <div class="fg"><label>官号 GMV（如 5.5）</label><input type="text" id="gmv_official" placeholder="5.5" oninput="updateCompare()"></div>
      <div class="fg"><label>达人 GMV（如 2.3）</label><input type="text" id="gmv_kol" placeholder="2.3" oninput="updateCompare()"></div>
    </div>
    <div class="pbox" id="compare_text">填写数据后自动生成...</div>
    <button class="btn bg" id="compareCopyBtn" onclick="copyCompare()">一键复制，发微信群</button>
    <button class="btn bm" onclick="resetCompare()">清空</button>
  </div>

</div>
<script>
var prevGMV=null,prevTime=null,hist=[];
function pad(n){return String(n).padStart(2,'0');}
function fmt(n){return String(Math.round(n));}
function getT(){return document.getElementById('hour').value+':'+document.getElementById('minute').value;}
function buildHours(){var s=document.getElementById('hour');for(var i=0;i<=23;i++){var o=document.createElement('option');o.value=pad(i);o.textContent=pad(i);s.appendChild(o);}}
function getNow(){var n=new Date();document.getElementById('hour').value=pad(n.getHours());document.getElementById('minute').value=n.getMinutes()>=30?'30':'00';updateHint();}
function updateHint(){
  var sm=document.getElementById('prev-summary');
  if(prevTime!==null&&prevGMV!==null){document.getElementById('hint').textContent='上一时段：'+prevTime+'  累计GMV：'+fmt(prevGMV);sm.style.display='block';sm.textContent='上次存档：'+prevTime+'  累计GMV '+fmt(prevGMV);}
  else{document.getElementById('hint').textContent='首次报数，无需上一时段数据';sm.style.display='none';}
  update();
}
function update(){
  var t=getT(),gmv=parseFloat(document.getElementById('gmv').value),cost=parseFloat(document.getElementById('cost').value),roiM=document.getElementById('roi_manual').value;
  var roi='—';
  if(!isNaN(gmv)&&!isNaN(cost)&&cost>0)roi=(gmv/cost).toFixed(2);
  if(roiM!=='')roi=parseFloat(roiM).toFixed(2);
  document.getElementById('roi_val').textContent=roi;
  var lines=[];
  if(!isNaN(gmv)||!isNaN(cost)||roi!=='—'){
    lines.push(t);
    if(!isNaN(gmv))lines.push('GMV：'+fmt(gmv));
    if(!isNaN(cost))lines.push('消耗：'+cost.toFixed(2));
    if(roi!=='—')lines.push('ROI：'+roi);
    if(!isNaN(gmv)&&prevGMV!==null&&prevTime!==null)lines.push(prevTime+'-'+t+' GMV：'+fmt(gmv-prevGMV));
  }
  document.getElementById('preview').textContent=lines.length?lines.join('\n'):'填写数据后自动生成...';
}
function renderHist(){
  var el=document.getElementById('hlist');
  if(hist.length===0){el.innerHTML='<div class="hempty">发送后自动记录</div>';return;}
  el.innerHTML=hist.map(function(r){return '<div class="hrow"><span style="font-size:14px;color:#888">'+r.p+'</span><span style="font-size:15px;font-weight:500;color:#1a1a1a">GMV '+fmt(r.g)+'</span></div>';}).join('');
}
function nextPeriod(){
  var gmv=parseFloat(document.getElementById('gmv').value),t=getT();
  if(!isNaN(gmv)&&prevGMV!==null&&prevTime!==null){hist.push({p:prevTime+'-'+t,g:gmv-prevGMV});renderHist();}
  if(!isNaN(gmv)){prevGMV=gmv;prevTime=t;}
  ['gmv','cost','roi_manual'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('roi_val').textContent='—';
  document.getElementById('preview').textContent='填写数据后自动生成...';
  updateHint();
}
function clearHistory(){hist=[];renderHist();}
function resetAll(){
  prevGMV=null;prevTime=null;hist=[];
  ['gmv','cost','roi_manual'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('roi_val').textContent='—';
  document.getElementById('preview').textContent='填写数据后自动生成...';
  document.getElementById('prev-summary').style.display='none';
  document.getElementById('hint').textContent='首次报数，无需上一时段数据';
  renderHist();
}
function updateCompare(){
  var off=document.getElementById('gmv_official').value.trim(),kol=document.getElementById('gmv_kol').value.trim(),t=getT();
  if(off===''&&kol===''){document.getElementById('compare_text').textContent='填写数据后自动生成...';return;}
  document.getElementById('compare_text').textContent='官号/达人 '+t+' '+(off!==''?off+'w':'—')+'/'+(kol!==''?kol+'w':'—');
}
function copyText(){doFlash('copyBtn','一键复制，发微信群',document.getElementById('preview').textContent);}
function copyCompare(){doFlash('compareCopyBtn','一键复制，发微信群',document.getElementById('compare_text').textContent);}
function resetCompare(){['gmv_official','gmv_kol'].forEach(function(id){document.getElementById(id).value='';});document.getElementById('compare_text').textContent='填写数据后自动生成...';}
function doFlash(id,orig,text){
  if(text==='填写数据后自动生成...')return;
  var btn=document.getElementById(id);
  var done=function(){btn.textContent='已复制！去粘贴到微信群';btn.classList.add('copied');setTimeout(function(){btn.textContent=orig;btn.classList.remove('copied');},2000);};
  if(navigator.clipboard)navigator.clipboard.writeText(text).then(done);
  else{var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);done();}
}
document.getElementById('hour').addEventListener('change',updateHint);
document.getElementById('minute').addEventListener('change',updateHint);
buildHours();getNow();
</script>
</body>
</html>
