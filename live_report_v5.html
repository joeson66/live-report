<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>直播数据报数工具</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif; background: #f5f5f0; min-height: 100vh; padding: 1rem; }
.wrap { max-width: 480px; margin: 0 auto; padding: 1rem 0; }
.card { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
.stitle { font-size: 12px; font-weight: 500; color: #888; margin-bottom: 12px; letter-spacing: 0.05em; text-transform: uppercase; }
.field-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
.field-group label { font-size: 13px; color: #888; }
.field-group input { border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; padding: 9px 10px; font-size: 15px; background: #f5f5f0; color: #1a1a1a; width: 100%; }
.field-group input:focus { outline: none; border-color: rgba(0,0,0,0.4); background: #fff; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.calc-row { background: #f5f5f0; border-radius: 8px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; margin-top: 2px; }
.calc-label { font-size: 13px; color: #888; }
.calc-value { font-size: 17px; font-weight: 500; color: #1a1a1a; }
.preview-box { background: #f5f5f0; border-radius: 8px; padding: 16px; font-size: 16px; line-height: 2.2; color: #1a1a1a; white-space: pre-wrap; min-height: 60px; border: 0.5px solid rgba(0,0,0,0.12); }
.btn { width: 100%; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; border: none; margin-top: 10px; }
.btn-copy { background: #1D9E75; color: #fff; }
.btn-next { background: #f5f5f0; color: #1a1a1a; border: 0.5px solid rgba(0,0,0,0.15); margin-top: 8px; }
.btn-reset { background: #f5f5f0; color: #888; border: 0.5px solid rgba(0,0,0,0.15); margin-top: 8px; font-size: 13px; }
.copied { background: #0F6E56 !important; }
.time-row { display: flex; gap: 8px; align-items: center; }
.time-row select { flex: 1; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; padding: 9px 10px; font-size: 15px; background: #f5f5f0; color: #1a1a1a; }
.hint { font-size: 12px; color: #888; margin-top: 6px; }
.prev-summary { font-size: 13px; color: #888; background: #f5f5f0; border-radius: 8px; padding: 8px 12px; margin-bottom: 10px; display: none; }
.divider { border: none; border-top: 0.5px solid rgba(0,0,0,0.08); margin: 4px 0 14px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="card">
    <div class="stitle">当前报数时间</div>
    <div class="time-row">
      <select id="hour"></select>
      <span style="color:#888">:</span>
      <select id="minute">
        <option value="00">00</option>
        <option value="30">30</option>
      </select>
    </div>
    <div class="hint" id="hint"></div>
  </div>

  <div class="card">
    <div class="stitle">本次数据（从平台抄）</div>
    <div class="two-col">
      <div class="field-group">
        <label>累计 GMV（元）</label>
        <input type="number" id="gmv" placeholder="82920" oninput="update()">
      </div>
      <div class="field-group">
        <label>累计消耗（元）</label>
        <input type="number" id="cost" placeholder="1530" oninput="update()">
      </div>
    </div>
    <div class="field-group">
      <label>ROI（可手动填，否则自动算）</label>
      <input type="number" id="roi_manual" placeholder="自动计算" oninput="update()">
    </div>
    <div class="calc-row" style="margin-top:6px">
      <span class="calc-label">全域 ROI</span>
      <span class="calc-value" id="roi_val">—</span>
    </div>
  </div>

  <div class="card">
    <div class="stitle">预览报告</div>
    <div class="prev-summary" id="prev-summary"></div>
    <div class="preview-box" id="preview">填写数据后自动生成...</div>
    <button class="btn btn-copy" id="copyBtn" onclick="copyText()">一键复制，发微信群</button>
    <button class="btn btn-next" onclick="nextPeriod()">已发送 → 准备下一时段 ↗</button>
    <button class="btn btn-reset" onclick="resetAll()">重新开播（清空所有）</button>
  </div>

  <div class="card">
    <div class="stitle">官号 / 达人 GMV 对比</div>
    <div class="field-group">
      <label>时间</label>
      <div class="time-row">
        <select id="c_hour"></select>
        <span style="color:#888">:</span>
        <select id="c_minute">
          <option value="00">00</option>
          <option value="30">30</option>
        </select>
      </div>
    </div>
    <hr class="divider">
    <div class="field-group">
      <label>官号/达人 GMV（输入如 5.5/2.3，自动加 w）</label>
      <input type="text" id="gmv_compare_input" placeholder="5.5/2.3" oninput="updateCompare()">
    </div>
    <div class="preview-box" id="compare_text">填写数据后自动生成...</div>
    <button class="btn btn-copy" id="compareCopyBtn" onclick="copyCompare()">一键复制，发微信群</button>
    <button class="btn btn-reset" onclick="resetCompare()">清空</button>
  </div>

</div>
<script>
function pad(n) { return String(n).padStart(2,'0'); }
function fmt(n) { return String(Math.round(n)); }

var prevGMV = null;
var prevTime = null;

function buildHours() {
  ['hour','c_hour'].forEach(function(id) {
    var sel = document.getElementById(id);
    for (var i = 0; i <= 23; i++) {
      var o = document.createElement('option');
      o.value = pad(i); o.textContent = pad(i);
      sel.appendChild(o);
    }
  });
}

function getSelectedTime() {
  return document.getElementById('hour').value + ':' + document.getElementById('minute').value;
}

function getCTime() {
  return document.getElementById('c_hour').value + ':' + document.getElementById('c_minute').value;
}

function getNow() {
  var now = new Date();
  var h = pad(now.getHours());
  var m = now.getMinutes() >= 30 ? '30' : '00';
  document.getElementById('hour').value = h;
  document.getElementById('minute').value = m;
  document.getElementById('c_hour').value = h;
  document.getElementById('c_minute').value = m;
  updateHint();
}

function updateHint() {
  var summary = document.getElementById('prev-summary');
  if (prevTime !== null && prevGMV !== null) {
    document.getElementById('hint').textContent = '上一时段：' + prevTime + '  累计GMV：' + fmt(prevGMV);
    summary.style.display = 'block';
    summary.textContent = '上次存档：' + prevTime + '  累计GMV ' + fmt(prevGMV);
  } else {
    document.getElementById('hint').textContent = '首次报数，无需上一时段数据';
    summary.style.display = 'none';
  }
  update();
}

function update() {
  var curTime = getSelectedTime();
  var gmv = parseFloat(document.getElementById('gmv').value);
  var cost = parseFloat(document.getElementById('cost').value);
  var roiM = document.getElementById('roi_manual').value;

  var roiVal = '—';
  if (!isNaN(gmv) && !isNaN(cost) && cost > 0) roiVal = (gmv / cost).toFixed(2);
  if (roiM !== '') roiVal = parseFloat(roiM).toFixed(2);
  document.getElementById('roi_val').textContent = roiVal;

  var lines = [];
  if (!isNaN(gmv) || !isNaN(cost) || roiVal !== '—') {
    lines.push(curTime);
    if (!isNaN(gmv)) lines.push('GMV：' + fmt(gmv));
    if (!isNaN(cost)) lines.push('消耗：' + cost.toFixed(2));
    if (roiVal !== '—') lines.push('ROI：' + roiVal);
    if (!isNaN(gmv) && prevGMV !== null && prevTime !== null) {
      lines.push(prevTime + '-' + curTime + ' GMV：' + fmt(gmv - prevGMV));
    }
  }
  document.getElementById('preview').textContent = lines.length ? lines.join('\n') : '填写数据后自动生成...';
}

function copyText() {
  var text = document.getElementById('preview').textContent;
  if (text === '填写数据后自动生成...') return;
  doFlash('copyBtn', '一键复制，发微信群', text);
}

function nextPeriod() {
  var gmv = parseFloat(document.getElementById('gmv').value);
  var curTime = getSelectedTime();
  if (!isNaN(gmv)) { prevGMV = gmv; prevTime = curTime; }
  ['gmv','cost','roi_manual'].forEach(function(id) { document.getElementById(id).value = ''; });
  document.getElementById('roi_val').textContent = '—';
  document.getElementById('preview').textContent = '填写数据后自动生成...';
  updateHint();
}

function resetAll() {
  prevGMV = null; prevTime = null;
  ['gmv','cost','roi_manual'].forEach(function(id) { document.getElementById(id).value = ''; });
  document.getElementById('roi_val').textContent = '—';
  document.getElementById('preview').textContent = '填写数据后自动生成...';
  document.getElementById('prev-summary').style.display = 'none';
  document.getElementById('hint').textContent = '首次报数，无需上一时段数据';
}

function addW(str) {
  return str.trim().split('/').map(function(s) {
    s = s.trim();
    if (s === '') return s;
    return s + 'w';
  }).join('/');
}

function updateCompare() {
  var val = document.getElementById('gmv_compare_input').value.trim();
  var t = getCTime();
  if (val === '') {
    document.getElementById('compare_text').textContent = '填写数据后自动生成...';
    return;
  }
  document.getElementById('compare_text').textContent = '官号/达人 ' + t + ' ' + addW(val);
}

function copyCompare() {
  var text = document.getElementById('compare_text').textContent;
  if (text === '填写数据后自动生成...') return;
  doFlash('compareCopyBtn', '一键复制，发微信群', text);
}

function resetCompare() {
  document.getElementById('gmv_compare_input').value = '';
  document.getElementById('compare_text').textContent = '填写数据后自动生成...';
}

function doFlash(btnId, originalText, textToCopy) {
  var btn = document.getElementById(btnId);
  var flash = function() {
    btn.textContent = '已复制！去粘贴到微信群';
    btn.classList.add('copied');
    setTimeout(function() { btn.textContent = originalText; btn.classList.remove('copied'); }, 2000);
  };
  if (navigator.clipboard) navigator.clipboard.writeText(textToCopy).then(flash);
  else { var ta = document.createElement('textarea'); ta.value = textToCopy; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); flash(); }
}

document.getElementById('hour').addEventListener('change', updateHint);
document.getElementById('minute').addEventListener('change', updateHint);
document.getElementById('c_hour').addEventListener('change', updateCompare);
document.getElementById('c_minute').addEventListener('change', updateCompare);

buildHours();
getNow();
</script>
</body>
</html>
